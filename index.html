            <a href="${selectedApp.downloadUrl}" target="_blank" class="final-download-btn">📲 DOWNLOAD ${selectedApp.name}</a>
            <div class="app-description">${description}<br><br><strong>🎯 Extra Benefits:</strong> Daily login rewards, referral cashback, and fast UPI withdrawals. 24/7 customer support.</div>
            
            <!-- Single referral bonus line -->
            <div style="background:#eef2ff; padding:6px 12px; border-radius:40px; display:inline-block; margin:6px 0 10px; font-size:0.7rem; font-weight:600; color:#1e293b;">
              🎁 Referral Bonus: ₹${refBonus}
            </div>

            <!-- 5 Offer Tags -->
            <div class="tag-section">
              <div class="tag-title" style="font-weight:700; font-size:0.95rem; margin-bottom:8px; color:#0b1e33;">📌 ${selectedApp.name} – Top Offers</div>
              <div class="tag-grid">${offerTags}</div>
            </div>

            <!-- View Tags Button - Blue Small -->
            <button class="view-tags-btn" id="viewTagsBtn">View Tags</button>

            <!-- Extra Tags (hidden initially) -->
            <div class="extra-tags" id="extraTagsContainer">
              ${extraTags}
            </div>

          </div>
          <div class="other-apps-title">Other Yono Apps</div>
          <div class="other-apps-grid" id="otherAppsGrid">${otherAppsHtml}</div>
          <div class="footer-note" style="margin-top:20px;">All apps: ₹100 min withdrawal | Trusted platform | 18+</div>
        </div>
      `;
      downloadContainer.innerHTML = downloadPageHtml;

      // Toggle extra tags
      document.getElementById('viewTagsBtn').addEventListener('click', function() {
        const container = document.getElementById('extraTagsContainer');
        container.classList.toggle('open');
        this.textContent = container.classList.contains('open') ? 'Hide Tags' : 'View Tags';
      });

      document.querySelectorAll('#otherAppsGrid .small-download').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const otherIdx = btn.getAttribute('data-other-index');
          if (otherIdx !== null) navigateToDownloadPage(parseInt(otherIdx));
          e.stopPropagation();
        });
      });
      setTimeout(() => {
        const topSection = document.getElementById('topDownloadSection');
        if (topSection) topSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    function goToMainGrid() {
      const gridDiv = document.getElementById('allAppsGrid');
      const downloadContainer = document.getElementById('downloadPageContainer');
      if (gridDiv && downloadContainer) {
        gridDiv.classList.remove('hidden');
        downloadContainer.classList.add('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
      currentSelectedIndex = null;
    }

    window.addEventListener('popstate', (event) => {
      if (customModal.style.display === 'flex') { closeModalAndResetHistory(); return; }
      if (event.state && event.state.page === 'download') showDownloadPage(event.state.index);
      else goToMainGrid();
    });
    history.replaceState({ page: 'main' }, '', window.location.pathname);

    function resetToMainGrid() {
      if (customModal.style.display === 'flex') closeModalAndResetHistory();
      history.replaceState({ page: 'main' }, '', window.location.pathname);
      goToMainGrid();
    }

    // ===== NAV CLICKS =====
    const homeNavLink = document.getElementById('homeNavLink');
    const navAbout = document.getElementById('navAbout');
    const navContact = document.getElementById('navContact');
    const navDisclaimer = document.getElementById('navDisclaimer');

    homeNavLink.addEventListener('click', (e) => { e.preventDefault(); resetToMainGrid(); document.querySelectorAll('.top-nav a').forEach(el => el.classList.remove('active')); homeNavLink.classList.add('active'); });

    navAbout.addEventListener('click', (e) => {
      e.preventDefault();
      document.querySelectorAll('.top-nav a').forEach(el => el.classList.remove('active'));
      navAbout.classList.add('active');
      showInfoModal('📖 About - Yono Games Site', `
        <p><strong>Welcome to Yono Games Site</strong> – a comprehensive hub dedicated to enhancing digital experiences for everyone. Our mission is to empower users with access to a wide range of applications with a unique focus on Indian users.</p>
        <p>We are not just about providing access to apps; we are about fostering a community where knowledge about the latest digital tools is shared and celebrated.</p>
        <hr style="margin:14px 0;border:1px dashed #ffcf8a;">
        <p><strong>🎯 Our Mission</strong><br>To provide the best gaming and app experience for Indian users with secure downloads and reliable service.</p>
        <p><strong>🔒 Secure Downloads</strong><br>All apps are verified and safe only.</p>
        <div style="margin-top:16px;text-align:center;border-top:2px solid #ffcf8a;padding-top:14px;">
          <div style="display:flex;justify-content:center;align-items:center;margin:12px 0 6px;">
            <div style="font-size:3.5rem;animation:spinRobot 3s linear infinite;filter:drop-shadow(0 0 12px rgba(0,200,255,0.6));background:radial-gradient(circle,#e0f7fa,#b2ebf2);border-radius:50%;padding:12px;width:80px;height:80px;display:flex;justify-content:center;align-items:center;box-shadow:0 0 24px rgba(0,150,255,0.3);">🤖</div>
          </div>
          <style>@keyframes spinRobot{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}</style>
          <div style="text-align:center;font-weight:700;color:#0a2e1d;font-size:0.8rem;letter-spacing:1px;margin-top:4px;background:linear-gradient(90deg,#ff4081,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Our intelligent AI is always spinning to help you</div>
        </div>
      `);
    });

    navContact.addEventListener('click', (e) => {
      e.preventDefault();
      document.querySelectorAll('.top-nav a').forEach(el => el.classList.remove('active'));
      navContact.classList.add('active');
      showInfoModal('📞 Contact Us - Yono Games Site', `
        <p><strong>Yono Games Site</strong> does not provide Customer Support for Listed Apps/Games. If you encounter any problems, please contact the support option within those games.</p>
        <p style="margin-top:14px;"><strong style="color:#d50000;">📢 Advertisement/Business Queries</strong><br>If you are a game maker company, operator, or administrator, and you want to promote your application, contact us through the details below.</p>
        <table class="contact-table">
          <tr><th>Title</th><th>Link</th></tr>
          <tr><td><strong>Email</strong></td><td><a href="mailto:support@YonoGamesSite.com" class="contact-email">support@YonoGamesSite.com</a></td></tr>
          <tr><td><strong>Telegram</strong></td><td><a href="https://t.me/YonoGamesSite" target="_blank" class="contact-telegram">@YonoGamesSite</a></td></tr>
        </table>
        <p style="margin-top:12px;background:linear-gradient(135deg,#ff4081,#ff8c00);padding:8px;border-radius:12px;color:white;font-weight:600;text-align:center;">⚡ Contact us through Email or Telegram</p>
      `);
    });

    navDisclaimer.addEventListener('click', (e) => {
      e.preventDefault();
      document.querySelectorAll('.top-nav a').forEach(el => el.classList.remove('active'));
      navDisclaimer.classList.add('active');
      showInfoModal('⚠️ Disclaimer - Yono Games Site', `
        <div style="background:linear-gradient(135deg,#fff5e6,#ffe6cc);padding:10px;border-radius:14px;margin-bottom:12px;text-align:center;"><h3 style="color:#b45900;font-weight:800;font-size:1.2rem;">Welcome to Yono Games Site</h3></div>
        <p style="font-weight:700;color:#1e562a;">This disclaimer applies to all users of the Yono Games Site website and the wide array of applications available on it.</p>
        <div class="disclaimer-section"><h4>Understanding the Scope of Our Platform</h4><p>Yono Games Site serves as a digital distribution platform for various third-party applications. Our role is limited to providing access to these apps.</p></div>
        <div class="disclaimer-section" style="border-left-color:#d50000;"><h4>User Responsibility and Financial Risk</h4><p><strong>Risk of Financial Activities</strong><br>The Apps may carry inherent risks including significant financial loss. You are solely responsible for any financial outcomes.</p></div>
        <div class="disclaimer-section" style="border-left-color:#0088cc;"><h4>Legal Age and Compliance</h4><p><strong>Age Restrictions</strong><br>Some Apps are designed for users above a certain age (usually 18 or 21). You must comply with these age restrictions.</p></div>
        <div class="disclaimer-box" style="background:#ffebee;border-color:#d50000;"><p><strong>⚠️ No Liability for Losses</strong><br>Yono Games Site shall not be liable for any direct, indirect, incidental, consequential, or punitive damages, including financial losses.</p></div>
        <div class="disclaimer-section" style="border-left-color:#9c27b0;"><h4>Awareness of Addiction Risks</h4><p><strong>Risk of Addiction:</strong> Certain apps can be addictive. We encourage responsible use.</p></div>
        <div class="disclaimer-box" style="background:#e8f5e9;border-color:#2ecc71;"><p><strong>Changes and Amendments</strong><br>We reserve the right to modify this disclaimer at any time.</p></div>
        <hr style="margin:12px 0;border:2px dashed #ffcf8a;">
        <div style="background:#fef4e6;padding:10px;border-radius:12px;margin:10px 0;"><h4 style="color:#b45900;">Disclaimer for Rummy Apps</h4><p>Rummy games are intended for users aged 18+ and involve elements of skill and chance. Play at your own risk.</p></div>
        <div style="margin-top:14px;text-align:center;background:linear-gradient(90deg,#ff4081,#ff8c00);padding:6px;border-radius:30px;color:white;font-weight:700;">⚡ Yono Games Site – Your Trusted App Discovery Platform ⚡</div>
      `);
    });

    // ===== INIT =====
    renderMainGrid();
  })();
</script>
